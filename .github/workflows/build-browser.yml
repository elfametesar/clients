# macOS-only CI for forks without Bitwarden's Azure or Apple signing credentials.
# Produces ad-hoc signed DMG/ZIP artifacts and bundles an ad-hoc signed Safari extension.
# Safari users must enable Safari > Settings > Developer > Allow unsigned extensions.

name: Build Desktop

on:
  pull_request:
    types: [opened, synchronize]
    branches-ignore:
      - 'l10n_master'
      - 'cf-pages'
    paths:
      - 'apps/desktop/**'
      - 'apps/browser/**'
      - 'libs/**'
      - '*'
      - '!*.md'
      - '!*.txt'
      - '.github/workflows/build-desktop.yml'
  push:
    branches:
      - 'main'
      - 'rc'
      - 'hotfix-rc-desktop'
    paths:
      - 'apps/desktop/**'
      - 'apps/browser/**'
      - 'libs/**'
      - '*'
      - '!*.md'
      - '!*.txt'
      - '.github/workflows/build-desktop.yml'
  workflow_call:
    inputs: {}
  workflow_dispatch:
    inputs:
      sdk_branch:
        description: "Custom SDK branch"
        required: false
        type: string

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  electron-verify:
    name: Verify Electron Version
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Verify
        run: |
          PACKAGE_VERSION=$(jq -r .devDependencies.electron package.json)
          ELECTRON_BUILDER_VERSION=$(jq -r .electronVersion ./apps/desktop/electron-builder.json)

          if [[ "$PACKAGE_VERSION" == "$ELECTRON_BUILDER_VERSION" ]]; then
            echo "Versions match"
          else
            echo "Version mismatch, package.json: $PACKAGE_VERSION, electron-builder.json: $ELECTRON_BUILDER_VERSION"
            exit 1
          fi

  setup:
    name: Setup
    runs-on: ubuntu-22.04
    outputs:
      package_version: ${{ steps.retrieve-version.outputs.package_version }}
      release_channel: ${{ steps.release-channel.outputs.channel }}
      build_number: ${{ steps.increment-version.outputs.build_number }}
      node_version: ${{ steps.retrieve-node-version.outputs.node_version }}
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Get package version
        id: retrieve-version
        run: |
          PKG_VERSION=$(jq -r .version src/package.json)
          echo "package_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set build number
        id: increment-version
        run: |
          BUILD_NUMBER=$((3000 + GITHUB_RUN_NUMBER))
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Get release channel
        id: release-channel
        env:
          _PACKAGE_VERSION: ${{ steps.retrieve-version.outputs.package_version }}
        run: |
          case "$_PACKAGE_VERSION" in
            *"alpha"*) echo "channel=alpha" >> "$GITHUB_OUTPUT" ;;
            *"beta"*) echo "channel=beta" >> "$GITHUB_OUTPUT" ;;
            *) echo "channel=latest" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Get Node version
        id: retrieve-node-version
        working-directory: ./
        run: |
          NODE_NVMRC=$(cat .nvmrc)
          echo "node_version=${NODE_NVMRC#v}" >> "$GITHUB_OUTPUT"

  macos-build:
    name: MacOS Build
    runs-on: macos-15
    needs: setup
    env:
      _NODE_VERSION: ${{ needs.setup.outputs.node_version }}
      NODE_OPTIONS: --max_old_space_size=4096
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: npm
          cache-dependency-path: '**/package-lock.json'
          node-version: ${{ env._NODE_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14.2'

      - name: Set up node-gyp
        run: python -m pip install setuptools

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: |
            apps/desktop/desktop_native -> target
          cache-targets: 'true'

      - name: Install Node dependencies
        run: npm ci
        working-directory: ./

      - name: Download SDK artifacts
        if: ${{ inputs.sdk_branch != '' }}
        uses: bitwarden/gh-actions/download-artifacts@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build-wasm-internal.yml
          workflow_conclusion: success
          branch: ${{ inputs.sdk_branch }}
          artifacts: sdk-internal
          repo: bitwarden/sdk-internal
          path: ../sdk-internal
          if_no_artifact_found: fail

      - name: Override SDK
        if: ${{ inputs.sdk_branch != '' }}
        working-directory: ./
        run: npm link ../sdk-internal

      - name: Build native module
        working-directory: apps/desktop/desktop_native
        run: node build.js cross-platform

      - name: Build desktop application
        run: npm run build

      - name: Cache desktop build
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: apps/desktop/build
          key: macos-desktop-${{ github.run_id }}

  browser-build:
    name: Browser Build
    runs-on: macos-15
    needs: setup
    env:
      _NODE_VERSION: ${{ needs.setup.outputs.node_version }}
      NODE_OPTIONS: --max_old_space_size=4096
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: npm
          cache-dependency-path: '**/package-lock.json'
          node-version: ${{ env._NODE_VERSION }}

      - name: Install Node dependencies
        run: npm ci

      - name: Download SDK artifacts
        if: ${{ inputs.sdk_branch != '' }}
        uses: bitwarden/gh-actions/download-artifacts@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build-wasm-internal.yml
          workflow_conclusion: success
          branch: ${{ inputs.sdk_branch }}
          artifacts: sdk-internal
          repo: bitwarden/sdk-internal
          path: ../sdk-internal
          if_no_artifact_found: fail

      - name: Override SDK
        if: ${{ inputs.sdk_branch != '' }}
        run: npm link ../sdk-internal

      - name: Build Safari extension with Xcode local signing
        working-directory: apps/browser
        run: |
          set -euo pipefail

          # Build the web-extension payload, then prepare the same generated
          # Xcode project layout used by package-safari.ps1. Do not disable
          # Xcode signing and do not post-sign the .appex: Safari development
          # builds need Xcode's "Sign to Run Locally" signature so the target
          # entitlements are embedded correctly.
          npm run build:prod:safari

          python3 - <<'PY'
          from pathlib import Path
          import json
          import shutil

          source = Path("src/safari")
          browser_build = Path("build")
          destination = Path("dist/Safari/dmg")

          if destination.exists():
              shutil.rmtree(destination)
          destination.parent.mkdir(parents=True, exist_ok=True)
          shutil.copytree(source, destination)
          shutil.copytree(browser_build, destination / "safari/app")

          manifest = json.loads((browser_build / "manifest.json").read_text())
          version = manifest["version"]

          info_plist = destination / "safari/Info.plist"
          info_text = info_plist.read_text()
          info_text = info_text.replace("0.0.1", version).replace("0.0.2", version)
          info_plist.write_text(info_text)

          project = destination / "desktop.xcodeproj/project.pbxproj"
          project_text = project.read_text().replace("../../../build", "../safari/app")
          project.write_text(project_text)

          print(f"Prepared Safari Xcode project at {destination}")
          PY

          SAFARI_ROOT="$PWD/dist/Safari/dmg"
          /usr/bin/xcodebuild \
            -project "$SAFARI_ROOT/desktop.xcodeproj" \
            -alltargets \
            -configuration Release \
            SYMROOT="$SAFARI_ROOT/build" \
            OBJROOT="$SAFARI_ROOT/build/Intermediates.noindex" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ENABLE_HARDENED_RUNTIME=NO

      - name: Verify Safari local signature and entitlements
        run: |
          set -euo pipefail

          APPEX="apps/browser/dist/Safari/dmg/build/Release/safari.appex"
          HOST="apps/browser/dist/Safari/dmg/build/Release/desktop.app"
          test -d "$APPEX"
          test -d "$HOST"

          codesign --verify --deep --strict --verbose=4 "$HOST"
          codesign --verify --deep --strict --verbose=4 "$APPEX"

          codesign -dv --verbose=4 "$APPEX" 2>&1 | tee "$RUNNER_TEMP/safari-signature.txt"
          grep -Fq 'Signature=adhoc' "$RUNNER_TEMP/safari-signature.txt"

          codesign -d --entitlements :- "$APPEX" 2>&1 | tee "$RUNNER_TEMP/safari-entitlements.txt"
          grep -Fq '<key>com.apple.security.app-sandbox</key>' "$RUNNER_TEMP/safari-entitlements.txt"
          grep -Fq '<key>com.apple.security.network.client</key>' "$RUNNER_TEMP/safari-entitlements.txt"
          grep -Fq '<key>com.apple.security.network.server</key>' "$RUNNER_TEMP/safari-entitlements.txt"

          ditto -c -k --sequesterRsrc --keepParent "$APPEX" safari-extension.zip

      - name: Upload Safari extension
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: safari-extension-${{ github.run_id }}
          path: safari-extension.zip
          if-no-files-found: error

  macos-package-github:
    name: MacOS Package Ad-Hoc Release
    runs-on: macos-15
    needs:
      - setup
      - macos-build
      - browser-build
    env:
      _PACKAGE_VERSION: ${{ needs.setup.outputs.package_version }}
      _NODE_VERSION: ${{ needs.setup.outputs.node_version }}
      NODE_OPTIONS: --max_old_space_size=4096
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: npm
          cache-dependency-path: '**/package-lock.json'
          node-version: ${{ env._NODE_VERSION }}


      - name: Cache Electron downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: macos-electron-${{ hashFiles('package-lock.json') }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14.2'

      - name: Set up node-gyp
        run: python -m pip install setuptools

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: |
            apps/desktop/desktop_native -> target
          cache-targets: 'true'

      - name: Install Node dependencies
        run: npm ci
        working-directory: ./

      - name: Restore desktop build
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: apps/desktop/build
          key: macos-desktop-${{ github.run_id }}
          fail-on-cache-miss: true

      - name: Build native module
        working-directory: apps/desktop/desktop_native
        run: node build.js cross-platform

      - name: Download Safari extension
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: safari-extension-${{ github.run_id }}
          path: ${{ runner.temp }}/safari-extension

      - name: Bundle Safari extension
        run: |
          rm -rf PlugIns
          mkdir -p PlugIns
          ditto -x -k "${{ runner.temp }}/safari-extension/safari-extension.zip" "${{ runner.temp }}/safari-unpacked"
          cp -R "${{ runner.temp }}/safari-unpacked/safari.appex" PlugIns/safari.appex
          codesign --verify --deep --strict --verbose=2 PlugIns/safari.appex

      - name: Configure desktop ad-hoc signing
        run: |
          set -euo pipefail

          # Sign the base Electron app ad-hoc, but do not put the Safari
          # extension into electron-builder's signing pass. We inject the
          # already-signed .appex after the base app has been produced.
          jq '
            .forceCodeSigning = false
            | .mac = ((.mac // {}) + {
                "identity":"-",
                "hardenedRuntime":false,
                "notarize":false
              })
            | del(
                .provisioningProfile,
                .mac.provisioningProfile,
                .mas.provisioningProfile,
                .masDev.provisioningProfile,
                .afterSign
              )
          ' electron-builder.json > electron-builder.json.tmp
          mv electron-builder.json.tmp electron-builder.json

          test "$(jq -r '.mac.identity' electron-builder.json)" = "-"
          test "$(jq -r '.mac.provisioningProfile // empty' electron-builder.json)" = ""

          # The upstream afterPack hook manually signs desktop_proxy with
          # Bitwarden's private Developer ID certificate. Keep the hook and
          # its fuse work, but make that one command ad-hoc and offline.
          python3 - <<'PY'
          from pathlib import Path

          script = Path("scripts/after-pack.js")
          source = script.read_text()
          certificate = "Developer ID Application: Bitwarden Inc"
          timestamp_option = "--timestamp --options runtime"

          if certificate not in source:
              raise SystemExit(
                  "Expected Bitwarden Developer ID identity was not found in scripts/after-pack.js"
              )
          if timestamp_option not in source:
              raise SystemExit(
                  "Expected codesign timestamp/runtime options were not found in scripts/after-pack.js"
              )

          source = source.replace(certificate, "-")
          source = source.replace(
              timestamp_option,
              "--timestamp=none --options runtime",
          )

          script.write_text(source)
          print(f"Configured {script} for offline ad-hoc signing")
          PY

          grep -Fq -- '--timestamp=none' scripts/after-pack.js
          if grep -Fq 'Developer ID Application: Bitwarden Inc' scripts/after-pack.js; then
            echo 'Developer ID identity remains in scripts/after-pack.js' >&2
            exit 1
          fi

      - name: Set build number
        shell: pwsh
        env:
          BUILD_NUMBER: ${{ needs.setup.outputs.build_number }}
        run: |
          $package = Get-Content -Raw -Path electron-builder.json | ConvertFrom-Json
          $package | Add-Member -Force -MemberType NoteProperty -Name buildVersion -Value "$env:BUILD_NUMBER"
          $package | ConvertTo-Json -Depth 32 | Set-Content -Path electron-builder.json

      - name: Build ad-hoc signed app directory
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          DEBUG: electron-builder
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            echo "Electron Builder attempt ${attempt}/3"
            rm -rf dist
            if ../../node_modules/.bin/electron-builder \
              --config electron-builder.json \
              --mac dir \
              --universal \
              -p never; then
              exit 0
            fi

            if [[ "$attempt" -lt 3 ]]; then
              delay=$((attempt * 20))
              echo "Electron download/build failed; retrying in ${delay}s" >&2
              sleep "$delay"
            fi
          done

          echo "Electron Builder failed after three attempts" >&2
          exit 1

      - name: Inject Safari extension and reseal app
        run: |
          set -euo pipefail

          APP=$(find dist/mac-universal -maxdepth 1 -type d -name '*.app' -print -quit)
          if [[ -z "$APP" ]]; then
            echo "Packaged macOS app was not found" >&2
            find dist -maxdepth 3 -print >&2
            exit 1
          fi

          mkdir -p "$APP/Contents/PlugIns"
          rm -rf "$APP/Contents/PlugIns/safari.appex"
          ditto PlugIns/safari.appex "$APP/Contents/PlugIns/safari.appex"

          # The extension already carries its own ad-hoc signature and
          # entitlements. Re-sign only the outer app bundle so its resource
          # seal includes the newly inserted extension; do not recursively
          # rewrite the extension's entitlements.
          codesign --verify --deep --strict --verbose=2 "$APP/Contents/PlugIns/safari.appex"
          codesign \
            --force \
            --sign - \
            --timestamp=none \
            --preserve-metadata=identifier,entitlements,requirements,flags \
            "$APP"

          APPEX="$APP/Contents/PlugIns/safari.appex"
          codesign --verify --deep --strict --verbose=4 "$APP"
          codesign --verify --deep --strict --verbose=4 "$APPEX"
          codesign -dv --verbose=4 "$APP" 2>&1
          codesign -dv --verbose=4 "$APPEX" 2>&1

          codesign -d --entitlements :- "$APPEX" 2>&1 | tee "$RUNNER_TEMP/embedded-safari-entitlements.txt"
          grep -Fq '<key>com.apple.security.app-sandbox</key>' "$RUNNER_TEMP/embedded-safari-entitlements.txt"
          grep -Fq '<key>com.apple.security.network.client</key>' "$RUNNER_TEMP/embedded-safari-entitlements.txt"

          # Register the finished host bundle exactly as macOS does after the
          # containing app is installed. Fail the build unless PlugInKit can
          # discover the Safari web-extension identifier.
          LSREGISTER="/System/Library/Frameworks/CoreServices.framework/Frameworks/LaunchServices.framework/Support/lsregister"
          "$LSREGISTER" -f "$APP"
          pluginkit -a "$APPEX"
          sleep 2
          pluginkit -mAvvv -p com.apple.Safari.web-extension 2>&1 | tee "$RUNNER_TEMP/pluginkit-safari.txt"
          grep -Fq 'com.bitwarden.desktop.safari' "$RUNNER_TEMP/pluginkit-safari.txt"

      - name: Create ZIP and DMG artifacts
        run: |
          set -euo pipefail

          APP=$(find dist/mac-universal -maxdepth 1 -type d -name '*.app' -print -quit)
          ZIP="dist/Bitwarden-${_PACKAGE_VERSION}-universal-mac.zip"
          DMG="dist/Bitwarden-${_PACKAGE_VERSION}-universal.dmg"
          STAGE="$RUNNER_TEMP/bitwarden-dmg-stage"

          rm -f "$ZIP" "$DMG"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$ZIP"

          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          ditto "$APP" "$STAGE/$(basename "$APP")"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create \
            -volname "Bitwarden ${_PACKAGE_VERSION}" \
            -srcfolder "$STAGE" \
            -ov \
            -format UDZO \
            "$DMG"

          test -s "$ZIP"
          test -s "$DMG"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Bitwarden-${{ env._PACKAGE_VERSION }}-universal-mac.zip
          path: apps/desktop/dist/Bitwarden-${{ env._PACKAGE_VERSION }}-universal-mac.zip
          if-no-files-found: error

      - name: Upload DMG artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Bitwarden-${{ env._PACKAGE_VERSION }}-universal.dmg
          path: apps/desktop/dist/Bitwarden-${{ env._PACKAGE_VERSION }}-universal.dmg
          if-no-files-found: error

  macos-beta:
    name: MacOS Beta Build
    runs-on: macos-15
    needs:
      - setup
      - macos-build
      - browser-build
      - macos-package-github
    env:
      _PACKAGE_VERSION: ${{ needs.setup.outputs.package_version }}
      _NODE_VERSION: ${{ needs.setup.outputs.node_version }}
      NODE_OPTIONS: --max_old_space_size=4096
      CHANNEL: beta
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: npm
          cache-dependency-path: '**/package-lock.json'
          node-version: ${{ env._NODE_VERSION }}


      - name: Cache Electron downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: macos-electron-${{ hashFiles('package-lock.json') }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14.2'

      - name: Set up node-gyp
        run: python -m pip install setuptools

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: |
            apps/desktop/desktop_native -> target
          cache-targets: 'true'

      - name: Install Node dependencies
        run: npm ci
        working-directory: ./

      - name: Restore desktop build
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: apps/desktop/build
          key: macos-desktop-${{ github.run_id }}
          fail-on-cache-miss: true

      - name: Build native module
        working-directory: apps/desktop/desktop_native
        run: node build.js cross-platform

      - name: Download Safari extension
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: safari-extension-${{ github.run_id }}
          path: ${{ runner.temp }}/safari-extension

      - name: Bundle Safari extension
        run: |
          rm -rf PlugIns
          mkdir -p PlugIns
          ditto -x -k "${{ runner.temp }}/safari-extension/safari-extension.zip" "${{ runner.temp }}/safari-unpacked"
          cp -R "${{ runner.temp }}/safari-unpacked/safari.appex" PlugIns/safari.appex
          codesign --verify --deep --strict --verbose=2 PlugIns/safari.appex

      - name: Configure beta version and desktop ad-hoc signing
        run: |
          set -euo pipefail

          jq '.version = .version + "-beta"' src/package.json > src/package.json.tmp
          mv src/package.json.tmp src/package.json

          # The beta config extends/overrides the base config, so sanitize both.
          for config in electron-builder.json electron-builder.beta.json; do
            jq '
              .forceCodeSigning = false
              | .mac = ((.mac // {}) + {
                  "identity":"-",
                  "hardenedRuntime":false,
                  "notarize":false
                })
              | del(
                  .provisioningProfile,
                  .mac.provisioningProfile,
                  .mas.provisioningProfile,
                  .masDev.provisioningProfile,
                  .afterSign
                )
            ' "$config" > "$config.tmp"
            mv "$config.tmp" "$config"

            test "$(jq -r '.mac.identity' "$config")" = "-"
            test "$(jq -r '.mac.provisioningProfile // empty' "$config")" = ""
          done

          python3 - <<'PY'
          from pathlib import Path

          script = Path("scripts/after-pack.js")
          source = script.read_text()
          certificate = "Developer ID Application: Bitwarden Inc"
          timestamp_option = "--timestamp --options runtime"

          if certificate not in source:
              raise SystemExit(
                  "Expected Bitwarden Developer ID identity was not found in scripts/after-pack.js"
              )
          if timestamp_option not in source:
              raise SystemExit(
                  "Expected codesign timestamp/runtime options were not found in scripts/after-pack.js"
              )

          source = source.replace(certificate, "-")
          source = source.replace(
              timestamp_option,
              "--timestamp=none --options runtime",
          )

          script.write_text(source)
          print(f"Configured {script} for offline ad-hoc signing")
          PY

          grep -Fq -- '--timestamp=none' scripts/after-pack.js
          if grep -Fq 'Developer ID Application: Bitwarden Inc' scripts/after-pack.js; then
            echo 'Developer ID identity remains in scripts/after-pack.js' >&2
            exit 1
          fi

      - name: Build ad-hoc signed beta app directory
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          DEBUG: electron-builder
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            echo "Electron Builder beta attempt ${attempt}/3"
            rm -rf dist
            if ../../node_modules/.bin/electron-builder \
              --config electron-builder.beta.json \
              --mac dir \
              --universal \
              -p never; then
              exit 0
            fi

            if [[ "$attempt" -lt 3 ]]; then
              delay=$((attempt * 20))
              echo "Electron beta download/build failed; retrying in ${delay}s" >&2
              sleep "$delay"
            fi
          done

          echo "Electron Builder beta failed after three attempts" >&2
          exit 1

      - name: Inject Safari extension and reseal beta app
        run: |
          set -euo pipefail

          APP=$(find dist/mac-universal -maxdepth 1 -type d -name '*.app' -print -quit)
          if [[ -z "$APP" ]]; then
            echo "Packaged beta macOS app was not found" >&2
            find dist -maxdepth 3 -print >&2
            exit 1
          fi

          mkdir -p "$APP/Contents/PlugIns"
          rm -rf "$APP/Contents/PlugIns/safari.appex"
          ditto PlugIns/safari.appex "$APP/Contents/PlugIns/safari.appex"

          codesign --verify --deep --strict --verbose=2 "$APP/Contents/PlugIns/safari.appex"
          codesign \
            --force \
            --sign - \
            --timestamp=none \
            --preserve-metadata=identifier,entitlements,requirements,flags \
            "$APP"

          APPEX="$APP/Contents/PlugIns/safari.appex"
          codesign --verify --deep --strict --verbose=4 "$APP"
          codesign --verify --deep --strict --verbose=4 "$APPEX"
          codesign -dv --verbose=4 "$APP" 2>&1
          codesign -dv --verbose=4 "$APPEX" 2>&1

          codesign -d --entitlements :- "$APPEX" 2>&1 | tee "$RUNNER_TEMP/embedded-safari-entitlements.txt"
          grep -Fq '<key>com.apple.security.app-sandbox</key>' "$RUNNER_TEMP/embedded-safari-entitlements.txt"
          grep -Fq '<key>com.apple.security.network.client</key>' "$RUNNER_TEMP/embedded-safari-entitlements.txt"

          # Register the finished host bundle exactly as macOS does after the
          # containing app is installed. Fail the build unless PlugInKit can
          # discover the Safari web-extension identifier.
          LSREGISTER="/System/Library/Frameworks/CoreServices.framework/Frameworks/LaunchServices.framework/Support/lsregister"
          "$LSREGISTER" -f "$APP"
          pluginkit -a "$APPEX"
          sleep 2
          pluginkit -mAvvv -p com.apple.Safari.web-extension 2>&1 | tee "$RUNNER_TEMP/pluginkit-safari.txt"
          grep -Fq 'com.bitwarden.desktop.safari' "$RUNNER_TEMP/pluginkit-safari.txt"

      - name: Create beta ZIP and DMG artifacts
        run: |
          set -euo pipefail

          APP=$(find dist/mac-universal -maxdepth 1 -type d -name '*.app' -print -quit)
          ZIP="dist/Bitwarden-${_PACKAGE_VERSION}-beta-universal-mac.zip"
          DMG="dist/Bitwarden-${_PACKAGE_VERSION}-beta-universal.dmg"
          STAGE="$RUNNER_TEMP/bitwarden-beta-dmg-stage"

          rm -f "$ZIP" "$DMG"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$ZIP"

          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          ditto "$APP" "$STAGE/$(basename "$APP")"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create \
            -volname "Bitwarden Beta ${_PACKAGE_VERSION}" \
            -srcfolder "$STAGE" \
            -ov \
            -format UDZO \
            "$DMG"

          test -s "$ZIP"
          test -s "$DMG"

      - name: Upload beta ZIP
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Bitwarden-${{ env._PACKAGE_VERSION }}-beta-universal-mac.zip
          path: apps/desktop/dist/Bitwarden-${{ env._PACKAGE_VERSION }}-beta-universal-mac.zip
          if-no-files-found: error

      - name: Upload beta DMG
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Bitwarden-${{ env._PACKAGE_VERSION }}-beta-universal.dmg
          path: apps/desktop/dist/Bitwarden-${{ env._PACKAGE_VERSION }}-beta-universal.dmg
          if-no-files-found: error

  validate-macos-dmg:
    name: Validate MacOS dmg
    runs-on: macos-15
    needs:
      - setup
      - macos-package-github
    env:
      _PACKAGE_VERSION: ${{ needs.setup.outputs.package_version }}
    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Bitwarden-${{ env._PACKAGE_VERSION }}-universal.dmg
          path: ${{ runner.temp }}/dmg

      - name: Mount, verify, and launch
        run: |
          DMG="${{ runner.temp }}/dmg/Bitwarden-${_PACKAGE_VERSION}-universal.dmg"
          MOUNT_POINT="${{ runner.temp }}/bitwarden-mount"
          mkdir -p "$MOUNT_POINT"
          hdiutil attach "$DMG" -mountpoint "$MOUNT_POINT" -nobrowse

          APP=$(find "$MOUNT_POINT" -type d -name '*.app' -prune -print | head -n 1)
          test -n "$APP"
          test -d "$APP/Contents/PlugIns/safari.appex"
          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP/Contents/PlugIns/safari.appex"

          cp -R "$APP" "${{ runner.temp }}/Bitwarden.app"
          hdiutil detach "$MOUNT_POINT"

          xattr -dr com.apple.quarantine "${{ runner.temp }}/Bitwarden.app" || true
          open "${{ runner.temp }}/Bitwarden.app"
          sleep 20
          pgrep -x Bitwarden
          pkill -x Bitwarden || true

