# macOS-only CI for forks without Bitwarden's Azure or Apple signing credentials.
# Produces ad-hoc signed DMG/ZIP artifacts and bundles an ad-hoc signed Safari extension.
# Safari users must enable Safari > Settings > Developer > Allow unsigned extensions.

name: Build Desktop

on:
  pull_request:
    types: [opened, synchronize]
    branches-ignore:
      - 'l10n_master'
      - 'cf-pages'
    paths:
      - 'apps/desktop/**'
      - 'apps/browser/**'
      - 'libs/**'
      - '*'
      - '!*.md'
      - '!*.txt'
      - '.github/workflows/build-desktop.yml'
  push:
    branches:
      - 'main'
      - 'rc'
      - 'hotfix-rc-desktop'
    paths:
      - 'apps/desktop/**'
      - 'apps/browser/**'
      - 'libs/**'
      - '*'
      - '!*.md'
      - '!*.txt'
      - '.github/workflows/build-desktop.yml'
  workflow_call:
    inputs: {}
  workflow_dispatch:
    inputs:
      sdk_branch:
        description: "Custom SDK branch"
        required: false
        type: string

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  electron-verify:
    name: Verify Electron Version
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Verify
        run: |
          PACKAGE_VERSION=$(jq -r .devDependencies.electron package.json)
          ELECTRON_BUILDER_VERSION=$(jq -r .electronVersion ./apps/desktop/electron-builder.json)

          if [[ "$PACKAGE_VERSION" == "$ELECTRON_BUILDER_VERSION" ]]; then
            echo "Versions match"
          else
            echo "Version mismatch, package.json: $PACKAGE_VERSION, electron-builder.json: $ELECTRON_BUILDER_VERSION"
            exit 1
          fi

  setup:
    name: Setup
    runs-on: ubuntu-22.04
    outputs:
      package_version: ${{ steps.retrieve-version.outputs.package_version }}
      release_channel: ${{ steps.release-channel.outputs.channel }}
      build_number: ${{ steps.increment-version.outputs.build_number }}
      node_version: ${{ steps.retrieve-node-version.outputs.node_version }}
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Get package version
        id: retrieve-version
        run: |
          PKG_VERSION=$(jq -r .version src/package.json)
          echo "package_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set build number
        id: increment-version
        run: |
          BUILD_NUMBER=$((3000 + GITHUB_RUN_NUMBER))
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Get release channel
        id: release-channel
        env:
          _PACKAGE_VERSION: ${{ steps.retrieve-version.outputs.package_version }}
        run: |
          case "$_PACKAGE_VERSION" in
            *"alpha"*) echo "channel=alpha" >> "$GITHUB_OUTPUT" ;;
            *"beta"*) echo "channel=beta" >> "$GITHUB_OUTPUT" ;;
            *) echo "channel=latest" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Get Node version
        id: retrieve-node-version
        working-directory: ./
        run: |
          NODE_NVMRC=$(cat .nvmrc)
          echo "node_version=${NODE_NVMRC#v}" >> "$GITHUB_OUTPUT"

  macos-build:
    name: MacOS Build
    runs-on: macos-15
    needs: setup
    env:
      _NODE_VERSION: ${{ needs.setup.outputs.node_version }}
      NODE_OPTIONS: --max_old_space_size=4096
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: npm
          cache-dependency-path: '**/package-lock.json'
          node-version: ${{ env._NODE_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14.2'

      - name: Set up node-gyp
        run: python -m pip install setuptools

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: |
            apps/desktop/desktop_native -> target
          cache-targets: 'true'

      - name: Install Node dependencies
        run: npm ci
        working-directory: ./

      - name: Download SDK artifacts
        if: ${{ inputs.sdk_branch != '' }}
        uses: bitwarden/gh-actions/download-artifacts@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build-wasm-internal.yml
          workflow_conclusion: success
          branch: ${{ inputs.sdk_branch }}
          artifacts: sdk-internal
          repo: bitwarden/sdk-internal
          path: ../sdk-internal
          if_no_artifact_found: fail

      - name: Override SDK
        if: ${{ inputs.sdk_branch != '' }}
        working-directory: ./
        run: npm link ../sdk-internal

      - name: Build native module
        working-directory: apps/desktop/desktop_native
        run: node build.js cross-platform

      - name: Build desktop application
        run: npm run build

      - name: Cache desktop build
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: apps/desktop/build
          key: macos-desktop-${{ github.run_id }}

  browser-build:
    name: Browser Build
    runs-on: macos-15
    needs: setup
    env:
      _NODE_VERSION: ${{ needs.setup.outputs.node_version }}
      NODE_OPTIONS: --max_old_space_size=4096
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: npm
          cache-dependency-path: '**/package-lock.json'
          node-version: ${{ env._NODE_VERSION }}

      - name: Install Node dependencies
        run: npm ci

      - name: Download SDK artifacts
        if: ${{ inputs.sdk_branch != '' }}
        uses: bitwarden/gh-actions/download-artifacts@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build-wasm-internal.yml
          workflow_conclusion: success
          branch: ${{ inputs.sdk_branch }}
          artifacts: sdk-internal
          repo: bitwarden/sdk-internal
          path: ../sdk-internal
          if_no_artifact_found: fail

      - name: Override SDK
        if: ${{ inputs.sdk_branch != '' }}
        run: npm link ../sdk-internal

      - name: Build Safari extension without Apple provisioning
        working-directory: apps/browser
        run: |
          set -euo pipefail

          # Generate the Safari web-extension payload and Xcode projects first.
          npm run build:prod:safari

          # Bitwarden's checked-in Xcode project contains its Apple team and
          # certificate settings. Clear them in both the source and generated
          # projects so this fork never requests those credentials.
          python3 - <<'PY'
          from pathlib import Path
          import re

          project_files = sorted(
              set(Path("src/safari").rglob("project.pbxproj"))
              | set(Path("dist/Safari").rglob("project.pbxproj"))
          )
          if not project_files:
              raise SystemExit("No Safari Xcode project files were generated")

          replacements = {
              "DEVELOPMENT_TEAM": '""',
              "CODE_SIGN_IDENTITY": '""',
              "PROVISIONING_PROFILE": '""',
              "PROVISIONING_PROFILE_SPECIFIER": '""',
          }

          for project in project_files:
              text = project.read_text()
              for key, value in replacements.items():
                  text = re.sub(
                      rf'(?m)^(\s*)("?{re.escape(key)}(?:\[[^]]+\])?"?)\s*=\s*[^;]*;',
                      rf'\1\2 = {value};',
                      text,
                  )
              project.write_text(text)
              print(f"Sanitized signing settings in {project}")

          # We only need the DMG Safari extension. The upstream packaging script
          # also builds a Mac App Store target and then re-signs every bundled
          # Swift dylib with Bitwarden's private Apple certificate. Restrict it
          # to the DMG target and change that post-build identity to ad-hoc.
          script = Path("scripts/package-safari.ps1")
          script_text = script.read_text()
          script_replacements = {
              '$subBuildPaths = @("mas", "dmg")': '$subBuildPaths = @("dmg")',
              '\'"Developer ID Application: Bitwarden Inc"\'': '"-"',
              '\'"3rd Party Mac Developer Application: Bitwarden Inc"\'': '"-"',
          }
          for old, new in script_replacements.items():
              if old not in script_text:
                  raise SystemExit(f"Expected Safari packaging token not found: {old}")
              script_text = script_text.replace(old, new)
          script.write_text(script_text)
          print("Configured package-safari.ps1 for DMG-only ad-hoc signing")
          PY

          # package-safari.ps1 invokes xcodebuild for its DMG project. Put a
          # wrapper first in PATH so compilation itself never performs a
          # certificate lookup or provisioning. The patched PowerShell script
          # then ad-hoc signs its dylibs and .appex with codesign --sign -.
          XCODE_WRAPPER_DIR="$RUNNER_TEMP/xcodebuild-no-provisioning"
          mkdir -p "$XCODE_WRAPPER_DIR"
          cat > "$XCODE_WRAPPER_DIR/xcodebuild" <<'SH'
          #!/bin/bash
          set -euo pipefail
          exec /usr/bin/xcodebuild "$@" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES
          SH
          chmod +x "$XCODE_WRAPPER_DIR/xcodebuild"

          PATH="$XCODE_WRAPPER_DIR:$PATH" ./scripts/package-safari.ps1

      - name: Ad-hoc sign and verify Safari extension
        run: |
          set -euo pipefail
          APPEX="apps/browser/dist/Safari/dmg/build/Release/safari.appex"
          ENTITLEMENTS="apps/browser/src/safari/safari/safari.entitlements"
          test -d "$APPEX"
          test -f "$ENTITLEMENTS"

          codesign --remove-signature "$APPEX" 2>/dev/null || true
          codesign \
            --force \
            --deep \
            --sign - \
            --timestamp=none \
            --entitlements "$ENTITLEMENTS" \
            "$APPEX"

          codesign --verify --deep --strict --verbose=2 "$APPEX"
          codesign -dv --verbose=4 "$APPEX" 2>&1 | tee "$RUNNER_TEMP/safari-signature.txt"
          grep -q 'Signature=adhoc' "$RUNNER_TEMP/safari-signature.txt"
          ditto -c -k --sequesterRsrc --keepParent "$APPEX" safari-extension.zip

      - name: Upload Safari extension
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: safari-extension-${{ github.run_id }}
          path: safari-extension.zip
          if-no-files-found: error

  macos-package-github:
    name: MacOS Package Ad-Hoc Release
    runs-on: macos-15
    needs:
      - setup
      - macos-build
      - browser-build
    env:
      _PACKAGE_VERSION: ${{ needs.setup.outputs.package_version }}
      _NODE_VERSION: ${{ needs.setup.outputs.node_version }}
      NODE_OPTIONS: --max_old_space_size=4096
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: npm
          cache-dependency-path: '**/package-lock.json'
          node-version: ${{ env._NODE_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14.2'

      - name: Set up node-gyp
        run: python -m pip install setuptools

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: |
            apps/desktop/desktop_native -> target
          cache-targets: 'true'

      - name: Install Node dependencies
        run: npm ci
        working-directory: ./

      - name: Restore desktop build
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: apps/desktop/build
          key: macos-desktop-${{ github.run_id }}
          fail-on-cache-miss: true

      - name: Build native module
        working-directory: apps/desktop/desktop_native
        run: node build.js cross-platform

      - name: Download Safari extension
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: safari-extension-${{ github.run_id }}
          path: ${{ runner.temp }}/safari-extension

      - name: Bundle Safari extension
        run: |
          rm -rf PlugIns
          mkdir -p PlugIns
          ditto -x -k "${{ runner.temp }}/safari-extension/safari-extension.zip" "${{ runner.temp }}/safari-unpacked"
          cp -R "${{ runner.temp }}/safari-unpacked/safari.appex" PlugIns/safari.appex
          codesign --verify --deep --strict --verbose=2 PlugIns/safari.appex

      - name: Configure desktop ad-hoc signing
        run: |
          set -euo pipefail

          jq '
            .forceCodeSigning = false
            | .mac = ((.mac // {}) + {"identity":"-", "hardenedRuntime":false})
            | del(.mac.provisioningProfile, .mas.provisioningProfile, .afterSign)
          ' electron-builder.json > electron-builder.json.tmp
          mv electron-builder.json.tmp electron-builder.json

          # electron-builder treats any configured provisioning profile as a
          # mandatory Apple signing asset, even when identity is ad-hoc (`-`).
          test "$(jq -r '.mac.provisioningProfile // empty' electron-builder.json)" = ""

          # The upstream afterPack hook manually signs desktop_proxy with
          # Bitwarden's private Developer ID certificate, bypassing the
          # electron-builder identity above. Keep the hook, but make its
          # codesign invocation ad-hoc and prevent timestamp-server access.
          python3 - <<'PY'
          from pathlib import Path
          import re

          script = Path("scripts/after-pack.js")
          source = script.read_text()
          certificate = "Developer ID Application: Bitwarden Inc"

          if certificate not in source:
              raise SystemExit(
                  "Expected Bitwarden Developer ID identity was not found in scripts/after-pack.js"
              )

          source = source.replace(certificate, "-")
          source, timestamp_count = re.subn(
              r"--timestamp(?:=[^\s'\"]+)?",
              "--timestamp=none",
              source,
          )
          if timestamp_count == 0:
              raise SystemExit("Expected codesign --timestamp option was not found")

          script.write_text(source)
          print(
              f"Configured {script} for ad-hoc signing; "
              f"updated {timestamp_count} timestamp option(s)"
          )
          PY

          grep -Fq 'codesign' scripts/after-pack.js
          grep -Fq -- '--timestamp=none' scripts/after-pack.js
          if grep -Fq 'Developer ID Application: Bitwarden Inc' scripts/after-pack.js; then
            echo 'Developer ID identity remains in scripts/after-pack.js' >&2
            exit 1
          fi

      - name: Set build number
        shell: pwsh
        env:
          BUILD_NUMBER: ${{ needs.setup.outputs.build_number }}
        run: |
          $package = Get-Content -Raw -Path electron-builder.json | ConvertFrom-Json
          $package | Add-Member -Force -MemberType NoteProperty -Name buildVersion -Value "$env:BUILD_NUMBER"
          $package | ConvertTo-Json -Depth 32 | Set-Content -Path electron-builder.json

      - name: Package ad-hoc signed app
        run: npm run pack:mac

      - name: Verify app and bundled extension signatures
        run: |
          APP=$(find dist -type d -name '*.app' -prune -print | head -n 1)
          test -n "$APP"
          test -d "$APP/Contents/PlugIns/safari.appex"
          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP/Contents/PlugIns/safari.appex"
          codesign -dv --verbose=4 "$APP" 2>&1 | tee "$RUNNER_TEMP/app-signature.txt"
          grep -q 'Signature=adhoc' "$RUNNER_TEMP/app-signature.txt"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Bitwarden-${{ env._PACKAGE_VERSION }}-universal-mac.zip
          path: apps/desktop/dist/Bitwarden-${{ env._PACKAGE_VERSION }}-universal-mac.zip
          if-no-files-found: error

      - name: Upload DMG artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Bitwarden-${{ env._PACKAGE_VERSION }}-universal.dmg
          path: apps/desktop/dist/Bitwarden-${{ env._PACKAGE_VERSION }}-universal.dmg
          if-no-files-found: error

      - name: Upload DMG blockmap
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Bitwarden-${{ env._PACKAGE_VERSION }}-universal.dmg.blockmap
          path: apps/desktop/dist/Bitwarden-${{ env._PACKAGE_VERSION }}-universal.dmg.blockmap
          if-no-files-found: error

      - name: Upload auto-update metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ needs.setup.outputs.release_channel }}-mac.yml
          path: apps/desktop/dist/${{ needs.setup.outputs.release_channel }}-mac.yml
          if-no-files-found: error

  macos-beta:
    name: MacOS Beta Build
    runs-on: macos-15
    needs:
      - setup
      - macos-build
      - browser-build
    env:
      _PACKAGE_VERSION: ${{ needs.setup.outputs.package_version }}
      _NODE_VERSION: ${{ needs.setup.outputs.node_version }}
      NODE_OPTIONS: --max_old_space_size=4096
      CHANNEL: beta
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: npm
          cache-dependency-path: '**/package-lock.json'
          node-version: ${{ env._NODE_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14.2'

      - name: Set up node-gyp
        run: python -m pip install setuptools

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: |
            apps/desktop/desktop_native -> target
          cache-targets: 'true'

      - name: Install Node dependencies
        run: npm ci
        working-directory: ./

      - name: Restore desktop build
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: apps/desktop/build
          key: macos-desktop-${{ github.run_id }}
          fail-on-cache-miss: true

      - name: Build native module
        working-directory: apps/desktop/desktop_native
        run: node build.js cross-platform

      - name: Download Safari extension
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: safari-extension-${{ github.run_id }}
          path: ${{ runner.temp }}/safari-extension

      - name: Bundle Safari extension
        run: |
          rm -rf PlugIns
          mkdir -p PlugIns
          ditto -x -k "${{ runner.temp }}/safari-extension/safari-extension.zip" "${{ runner.temp }}/safari-unpacked"
          cp -R "${{ runner.temp }}/safari-unpacked/safari.appex" PlugIns/safari.appex
          codesign --verify --deep --strict --verbose=2 PlugIns/safari.appex

      - name: Configure beta version and desktop ad-hoc signing
        run: |
          set -euo pipefail

          jq '.version = .version + "-beta"' src/package.json > src/package.json.tmp
          mv src/package.json.tmp src/package.json
          jq '
            .forceCodeSigning = false
            | .mac = ((.mac // {}) + {"identity":"-", "hardenedRuntime":false})
            | del(.mac.provisioningProfile, .mas.provisioningProfile, .afterSign)
          ' electron-builder.json > electron-builder.json.tmp
          mv electron-builder.json.tmp electron-builder.json

          # electron-builder treats any configured provisioning profile as a
          # mandatory Apple signing asset, even when identity is ad-hoc (`-`).
          test "$(jq -r '.mac.provisioningProfile // empty' electron-builder.json)" = ""

          python3 - <<'PY'
          from pathlib import Path
          import re

          script = Path("scripts/after-pack.js")
          source = script.read_text()
          certificate = "Developer ID Application: Bitwarden Inc"

          if certificate not in source:
              raise SystemExit(
                  "Expected Bitwarden Developer ID identity was not found in scripts/after-pack.js"
              )

          source = source.replace(certificate, "-")
          source, timestamp_count = re.subn(
              r"--timestamp(?:=[^\s'\"]+)?",
              "--timestamp=none",
              source,
          )
          if timestamp_count == 0:
              raise SystemExit("Expected codesign --timestamp option was not found")

          script.write_text(source)
          print(
              f"Configured {script} for ad-hoc signing; "
              f"updated {timestamp_count} timestamp option(s)"
          )
          PY

          grep -Fq 'codesign' scripts/after-pack.js
          grep -Fq -- '--timestamp=none' scripts/after-pack.js
          if grep -Fq 'Developer ID Application: Bitwarden Inc' scripts/after-pack.js; then
            echo 'Developer ID identity remains in scripts/after-pack.js' >&2
            exit 1
          fi

      - name: Package ad-hoc signed beta
        run: npm run pack:mac:beta

      - name: Verify beta signatures
        run: |
          APP=$(find dist -type d -name '*.app' -prune -print | head -n 1)
          test -n "$APP"
          test -d "$APP/Contents/PlugIns/safari.appex"
          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP/Contents/PlugIns/safari.appex"
          codesign -dv --verbose=4 "$APP" 2>&1 | tee "$RUNNER_TEMP/app-signature.txt"
          grep -q 'Signature=adhoc' "$RUNNER_TEMP/app-signature.txt"

      - name: Upload beta ZIP
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Bitwarden-${{ env._PACKAGE_VERSION }}-beta-universal-mac.zip
          path: apps/desktop/dist/Bitwarden-${{ env._PACKAGE_VERSION }}-beta-universal-mac.zip
          if-no-files-found: error

      - name: Upload beta DMG
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Bitwarden-${{ env._PACKAGE_VERSION }}-beta-universal.dmg
          path: apps/desktop/dist/Bitwarden-${{ env._PACKAGE_VERSION }}-beta-universal.dmg
          if-no-files-found: error

      - name: Upload beta update metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: beta-mac.yml
          path: apps/desktop/dist/beta-mac.yml
          if-no-files-found: error

  validate-macos-dmg:
    name: Validate MacOS dmg
    runs-on: macos-15
    needs:
      - setup
      - macos-package-github
    env:
      _PACKAGE_VERSION: ${{ needs.setup.outputs.package_version }}
    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: Bitwarden-${{ env._PACKAGE_VERSION }}-universal.dmg
          path: ${{ runner.temp }}/dmg

      - name: Mount, verify, and launch
        run: |
          DMG="${{ runner.temp }}/dmg/Bitwarden-${_PACKAGE_VERSION}-universal.dmg"
          MOUNT_POINT="${{ runner.temp }}/bitwarden-mount"
          mkdir -p "$MOUNT_POINT"
          hdiutil attach "$DMG" -mountpoint "$MOUNT_POINT" -nobrowse

          APP=$(find "$MOUNT_POINT" -type d -name '*.app' -prune -print | head -n 1)
          test -n "$APP"
          test -d "$APP/Contents/PlugIns/safari.appex"
          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP/Contents/PlugIns/safari.appex"

          cp -R "$APP" "${{ runner.temp }}/Bitwarden.app"
          hdiutil detach "$MOUNT_POINT"

          xattr -dr com.apple.quarantine "${{ runner.temp }}/Bitwarden.app" || true
          open "${{ runner.temp }}/Bitwarden.app"
          sleep 20
          pgrep -x Bitwarden
          pkill -x Bitwarden || true
